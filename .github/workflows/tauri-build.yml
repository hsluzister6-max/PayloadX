name: "Release"

on:
  push:
    branches:
      - main
      - dev
      - expressjs
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - dev
      - expressjs

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-13, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install project dependencies
        run: npm install



      - name: Build and Upload Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: "apps/desktop"
          releaseName: "PayloadX-API-Studio v__VERSION__"
          releaseBody: "PayloadX API Studio Release (Signed & Notarized macOS Build)"
          releaseDraft: false
          prerelease: false
          tagName: ${{ github.ref_name }}

  rename-assets:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename Release Assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.GITHUB_REF_NAME;
            
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              for (const asset of release.data.assets) {
                // Remove version like _1.4.7 or _v1.4.7
                const newName = asset.name.replace(/_v?\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?/, '');
                if (newName !== asset.name) {
                  console.log(`Renaming ${asset.name} to ${newName}`);
                  await github.rest.repos.updateReleaseAsset({
                    owner,
                    repo,
                    asset_id: asset.id,
                    name: newName
                  });
                }
              }
            } catch (error) {
              console.error('Error fetching release or renaming assets:', error);
            }
