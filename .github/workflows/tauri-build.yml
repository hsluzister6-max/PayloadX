name: "Release"

on:
  push:
    branches:
      - main
      - dev
      - expressjs
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - dev
      - expressjs

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-13, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install project dependencies
        run: npm install



      - name: Build and Upload Tauri App
        id: tauri_action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: "apps/desktop"
          releaseName: "PayloadX-API-Studio v__VERSION__"
          releaseBody: "PayloadX API Studio Release (Signed & Notarized macOS Build)"
          releaseDraft: false
          prerelease: false
          tagName: ${{ github.ref_name }}

      - name: Rename Release Assets
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release_id = '${{ steps.tauri_action.outputs.releaseId }}';
            if (!release_id) {
              console.log('No releaseId output from tauri-action');
              return;
            }
            const { owner, repo } = context.repo;
            const release = await github.rest.repos.getRelease({ owner, repo, release_id });
            
            for (const asset of release.data.assets) {
              // 1. Remove version patterns like _1.0.0 or -1.0.0
              let newName = asset.name.replace(/[_-]v?\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?/, '');
              
              // 2. Remove locale strings like _en-US (common in Windows MSI/NSIS)
              newName = newName.replace(/[_-][a-z]{2}-[A-Z]{2}/, '');
              
              // 3. Ensure Linux names match landing page 'payload-x'
              if (newName.includes('payloadx-api-studio')) {
                newName = newName.replace('payloadx-api-studio', 'payload-x');
              }
              if (newName.includes('PayloadX') && (newName.endsWith('.deb') || newName.endsWith('.AppImage'))) {
                newName = newName.replace('PayloadX', 'payload-x');
              }

              if (newName !== asset.name) {
                // Check if an asset with newName already exists
                const existing = release.data.assets.find(a => a.name === newName);
                if (existing) {
                  console.log(`Deleting existing asset: ${newName}`);
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: existing.id });
                }
                
                console.log(`Renaming ${asset.name} to ${newName}`);
                try {
                  await github.rest.repos.updateReleaseAsset({
                    owner, repo, asset_id: asset.id, name: newName
                  });
                } catch (e) {
                  console.error(`Failed to rename ${asset.name}: ${e.message}`);
                }
              }
            }

